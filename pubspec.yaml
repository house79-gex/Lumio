name: photoai_catalog
description: PhotoAI Catalog - Catalogazione intelligente foto con IA
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  photo_manager: ^3.0.0
  permission_handler: ^11.3.0
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  path: ^1.9.0
  shared_preferences: ^2.2.2
  google_generative_ai: ^0.4.3
  exif: ^2.0.0
  dio: ^5.4.0
  uuid: ^4.3.3
  flutter_secure_storage: ^9.0.0
  connectivity_plus: ^6.0.5
  file_picker: ^8.0.0+1
  flutter_image_compress: ^2.1.0
  workmanager: ^0.5.2
  google_sign_in: ^6.2.1
  extension_google_sign_in_as_googleapis_auth: ^2.0.13
  googleapis: ^13.0.0
  googleapis_auth: ^1.4.1
  google_mlkit_face_detection: ^0.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/professions/
